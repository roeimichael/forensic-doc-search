# Self-hosted, on-prem vector store (Qdrant). No managed cloud service.
# Spin up:   docker compose up -d
# Tear down: docker compose down   (data persists in ./qdrant_storage)
#
# Pinned to v1.13.0: datetime range-filter behaviour is reliable from 1.13+.
services:
  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: forensic-rag-qdrant
    ports:
      - "6333:6333"   # HTTP REST API (used by qdrant-client)
      - "6334:6334"   # gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage   # persistence across restarts
    restart: unless-stopped
    healthcheck:
      # Qdrant ships no shell/curl; use its own bundled readiness probe.
      test: ["CMD", "/qdrant/qdrant", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
